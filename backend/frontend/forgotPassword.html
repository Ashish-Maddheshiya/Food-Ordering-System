<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
        }
        
        .card {
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .25);
            text-align: center;
            animation: fadeIn .5s ease;
        }
        
        @keyframes fadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        
        input:focus {
            border-color: #ff5e62;
        }
        
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #ff5e62;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #ff3b44;
            transform: scale(1.02);
        }
        
        #otpSection {
            display: none;
        }
        
        .back {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #ff5e62;
            font-weight: bold;
        }
        
        .success {
            color: green;
            margin-top: 10px;
        }
        
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo">🍔</div>

        <h1>Forgot Password</h1>

        <p>Enter your registered email and receive OTP</p>

        <input type="email" id="email" placeholder="Enter Email">

        <button onclick="testButton()">
    Send OTP
</button>

        <div id="otpSection">

            <input type="text" id="otp" placeholder="Enter OTP">

            <input type="password" id="password" placeholder="New Password">

            <input type="password" id="confirmPassword" placeholder="Confirm Password">

            <button onclick="resetPassword()">
            🔒 Reset Password
        </button>

        </div>

        <a href="index.html" class="back">
        ← Back To Login
    </a>

    </div>

    <script>
        async function sendOTP() {
            console.log("SEND OTP BUTTON CLICKED");

            const email = document.getElementById("email").value;

            if (!email) {
                alert("Enter Email");
                return;
            }

            const res = await fetch(
                "https://food-ordering-system-production-abb0.up.railway.app/api/auth/send-otp", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email
                    })
                });

            const data = await res.json();

            alert(data.message);

            if (data.success) {
                document.getElementById("otpSection").style.display = "block";
            }
        }

        async function resetPassword() {

            const email = document.getElementById("email").value;
            const otp = document.getElementById("otp").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            const res = await fetch(
                "https://food-ordering-system-production-abb0.up.railway.app/api/auth/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        otp,
                        password
                    })
                });

            const data = await res.json();

            alert(data.message);

            if (data.success) {
                window.location.href = "index.html";
            }
        }

        function testButton() {
            alert("Button Click Ho Raha Hai ✅");
        }
    </script>

</body>

</html>
